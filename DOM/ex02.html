<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count Number</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        main {
            margin: auto;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            flex-flow: column wrap;
            background-color: lightslategrey;
            width: 90dvw;
        }
        h1 {
            margin: 10px;
        }
        p {
            text-align: center;
            padding: 20px;
            background-color: lightgray;
            border-radius: 10px;
            width: 100px;
            font-size: 3em;
        }
        input {
            margin: 10px;
            border-radius: 10px;
            border: none;
            text-align: center;
            padding: 10px;
        }

        input#sum, input#sub {
            font-size: 1.2em;
            cursor: pointer;
        }

        
    </style>
</head>
<body>
    <main>
        <h1>Number Counter</h1>
        <p id="res">0</p>
        <label for="num">Type a positive number to add or subtract from the number above.</label>
        <input type="number" name="num" id="num">
        <div>
            <input type="submit" value="+" id="sum" onclick="sum()">
            <input type="submit" value="-" id="sub" onclick="sub()">
        </div>
    </main>
    <script>
        function calc(op){
            const input = document.getElementById("num")
            const num = Number(input.value)
            const output = document.getElementById("res")
            const res = Number(output.textContent)
            
            if (isNaN(num) || num <= 0){
                alert("Type a positive number!")
                return
            }
            
            output.textContent = op === sum ? res + num : res - num
            input.value = ""
        }

    </script>
</body>
</html>

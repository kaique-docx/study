<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count Number</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        main {
            margin: auto;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            flex-flow: column wrap;
            background-color: lightslategrey;
            width: 90dvw;
        }
        h1 {
            margin: 10px;
        }
        p {
            text-align: center;
            padding: 20px;
            background-color: lightgray;
            width: 100px;
            font-size: 3em;
        }
        input {
            margin: 10px;
            border-radius: 10px;
            border: none;
            text-align: center;
            padding: 10px;
        }

        input#sum, input#sub {
            font-size: 1.2em;
            cursor: pointer;
        }
        

        
    </style>
</head>
<body>
    <main>
        <h1>Type a short message</h1>
        <p id="res">0</p>
        <label for="num">Type a number to add or subtract from the number above.</label>
        <input type="number" name="num" id="num">
        <div>
            <input type="submit" value="+" id="sum" onclick="sum()">
            <input type="submit" value="-" id="sub" onclick="sub()">
        </div>
        <div id="res"></div>
    </main>
    <script>
        function sum(){
            const num = document.getElementById("num")
            const res = Number(document.getElementById("res"))

            let sum = num.value + res.value

            if (num < 0){
                alert("Type a positive number!")
            } else {
                res.innerHTML = sum
            }
        }
    </script>
</body>
</html>
